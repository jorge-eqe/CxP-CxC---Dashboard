<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CXP / CXC Control · SAP S/4HANA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0d0f14; --surface:#13161d; --surface2:#1a1e28; --surface3:#1f2333;
  --border:#252a38; --border2:#2e3447;
  --text:#e8eaf0; --muted:#6b7280; --muted2:#4b5263;
  --accent:#3b82f6; --green:#10b981; --yellow:#f59e0b;
  --orange:#f97316; --red:#ef4444; --teal:#14b8a6; --purple:#8b5cf6;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}
.shell{display:grid;grid-template-columns:230px 1fr;grid-template-rows:56px 1fr;min-height:100vh}
.topbar{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.main{overflow-y:auto;padding:24px 28px}

.logo{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.08em}
.logo span{color:var(--accent)}
.dv{width:1px;height:20px;background:var(--border)}
.soc-select{background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:5px 10px;border-radius:6px;font-family:var(--mono);font-size:12px;cursor:pointer;outline:none}
.tright{margin-left:auto;display:flex;align-items:center;gap:10px}
.pill{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid}
.pill-y{color:var(--yellow);background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.25)}
.pill-m{color:var(--muted);background:transparent;border-color:var(--border)}
.pill-g{color:var(--green);background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.25)}
.pill-f{color:var(--yellow);background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.25)}

.nav-section{padding:0 14px;margin-bottom:4px}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--muted2);text-transform:uppercase;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;border:1px solid transparent}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,.12);color:var(--accent);border-color:rgba(59,130,246,.2)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.nbadge{margin-left:auto;font-family:var(--mono);font-size:10px;background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.25);padding:1px 6px;border-radius:3px}
.ndiv{height:1px;background:var(--border);margin:8px 14px}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kc,var(--accent))}
.kpi-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.kpi-val{font-family:var(--mono);font-size:24px;font-weight:600;letter-spacing:-.02em}
.kpi-cur{font-size:12px;color:var(--muted);margin-right:3px}
.kpi-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:5px}
.kpi-dlt{font-family:var(--mono);font-size:11px;margin-top:5px}
.kpi-dlt.up{color:var(--red)} .kpi-dlt.dn{color:var(--green)}

.bar-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
.bar-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.bar-card-title{font-size:13px;font-weight:600;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.bar-lbl{font-size:11px;color:var(--muted);width:52px;flex-shrink:0;font-family:var(--mono)}
.bar-track{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-amt{font-family:var(--mono);font-size:11px;width:70px;text-align:right;color:var(--text);flex-shrink:0}
.bar-pct{font-family:var(--mono);font-size:10px;color:var(--muted);width:28px;text-align:right;flex-shrink:0}

.sec-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:14px;font-weight:600}
.sec-sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}

.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fi{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-family:var(--sans);font-size:12px;cursor:pointer;outline:none}
.fi::placeholder{color:var(--muted)}
.fi-w{width:196px}
.fcnt{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
select option{background:#1a1e28}

.tw{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:22px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:1120px}
thead th{background:var(--surface2);padding:9px 12px;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
thead th.r{text-align:right}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:10px 12px;font-size:12px;vertical-align:middle}
.tm{font-weight:500;font-size:13px}
.ts{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.tr{text-align:right;font-family:var(--mono);font-size:11px}

.bkt{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 7px;border-radius:4px;letter-spacing:.04em;white-space:nowrap}
.b0{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.b30{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.b60{background:rgba(249,115,22,.1);color:var(--orange);border:1px solid rgba(249,115,22,.2)}
.b90{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}

.dt{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;border:1px solid var(--border2);color:var(--text);background:var(--surface2)}
.dt.bad{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.07);color:var(--red)}

.ctag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px}
.c-mxn{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.c-usd{background:rgba(59,130,246,.1);color:var(--accent);border:1px solid rgba(59,130,246,.2)}
.c-eur{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.2)}

.st{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 7px;border-radius:4px}
.sd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.s-p{background:rgba(245,158,11,.1);color:var(--yellow)} .s-p .sd{background:var(--yellow)}
.s-pa{background:rgba(59,130,246,.1);color:var(--accent)} .s-pa .sd{background:var(--accent)}
.s-ok{background:rgba(16,185,129,.1);color:var(--green)} .s-ok .sd{background:var(--green)}
.s-v{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)} .s-v .sd{background:var(--red)}

.at{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600;white-space:nowrap}
.at-r{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.at-s{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.at-o{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.at-g{background:rgba(20,184,166,.1);color:var(--teal);border:1px solid rgba(20,184,166,.2)}

.gl-cell{display:flex;flex-direction:column;gap:2px}
.gl-num{font-family:var(--mono);font-size:10px;color:var(--muted)}
.gl-desc{font-size:11px;font-weight:500}

.sb{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;border:1px solid var(--border);color:var(--muted)}

.tc-b{font-family:var(--mono);font-size:9px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:1px 5px;border-radius:3px}

.info-box{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:16px}
.info-box strong{color:var(--text);font-weight:500}

.al-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
.al-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.al-card.danger{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.025)}
.al-card.warn{border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.02)}
.al-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ac{font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:3px}
.ac-r{background:rgba(239,68,68,.15);color:var(--red)}
.ac-y{background:rgba(245,158,11,.15);color:var(--yellow)}
.al-item{display:flex;align-items:flex-start;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);gap:12px}
.al-item:last-child{border-bottom:none;padding-bottom:0}
.al-nm{font-size:12px;font-weight:500}
.al-dc{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.al-rt{text-align:right;flex-shrink:0}
.al-days{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--red)}
.al-amt{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.al-sign{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--red)}
.al-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}

.cfg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.cfg-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.cfg-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.cfg-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.cfg-row:last-child{border-bottom:none;padding-bottom:0}
.cfg-k{color:var(--muted)}
.cfg-v{font-family:var(--mono);font-weight:500}

.empty{text-align:center;padding:32px;color:var(--muted);font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* ── UPLOAD PAGE ── */
.up-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px}
.up-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px}
.up-card.active-src{border-color:rgba(59,130,246,.35);background:rgba(59,130,246,.03)}
.up-card-title{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.up-card-sub{font-size:11px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.drop-zone{border:1.5px dashed var(--border2);border-radius:8px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(59,130,246,.06)}
.drop-icon{font-size:28px;margin-bottom:8px;opacity:.5}
.drop-lbl{font-size:12px;color:var(--muted);line-height:1.7}
.drop-lbl strong{color:var(--text)}
.drop-input{display:none}
.up-btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);margin-top:12px;transition:background .15s}
.up-btn:hover{background:var(--accent2)}
.up-btn.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.up-btn.sec:hover{border-color:var(--accent);color:var(--accent)}
.up-btn:disabled{opacity:.4;cursor:default}
.up-status{margin-top:14px;font-size:12px;font-family:var(--mono);color:var(--muted);min-height:18px}
.up-status.ok{color:var(--green)} .up-status.err{color:var(--red)} .up-status.warn{color:var(--yellow)}
.up-preview{margin-top:16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.up-prev-hdr{padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.up-prev-body{overflow-x:auto;max-height:220px;overflow-y:auto}
.up-prev-body table{min-width:100%}
.up-prev-body thead th{background:var(--surface);padding:7px 12px;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
.up-prev-body tbody td{padding:7px 12px;font-size:11px;font-family:var(--mono);border-bottom:1px solid var(--border);white-space:nowrap}
.up-prev-body tbody tr:last-child td{border-bottom:none}
.up-prev-body tbody tr:hover{background:var(--surface)}
.field-map{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.field-row{display:flex;align-items:center;gap:8px;font-size:11px}
.field-sap{font-family:var(--mono);font-size:10px;color:var(--teal);background:rgba(20,184,166,.08);border:1px solid rgba(20,184,166,.2);padding:2px 7px;border-radius:3px;min-width:80px;text-align:center}
.field-arr{color:var(--muted);flex-shrink:0}
.field-col{font-family:var(--mono);font-size:10px;color:var(--muted)}
.src-tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600}
.src-api{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.src-file{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.src-mock{background:rgba(107,114,128,.1);color:var(--muted);border:1px solid var(--border)}
.tpl-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.sync-info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:22px}
.sync-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}
.sync-opt{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .15s}
.sync-opt:hover{border-color:var(--border2)}
.sync-opt.selected{border-color:var(--accent);background:rgba(59,130,246,.06)}
.sync-opt-title{font-size:12px;font-weight:600;margin-bottom:4px}
.sync-opt-sub{font-size:11px;color:var(--muted);line-height:1.5}
.sync-freq{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(59,130,246,.1);color:var(--accent);border:1px solid rgba(59,130,246,.2);margin-bottom:6px}
</style>
</head>
<body>
<div class="shell">
<header class="topbar">
  <div class="logo">CXP<span>/</span>CXC <span style="color:var(--muted);font-weight:300">Control</span></div>
  <div class="dv"></div>
  <span style="font-size:11px;color:var(--muted)">SAP S/4HANA Cloud</span>
  <div class="dv"></div>
  <select class="soc-select" id="socFilter" onchange="setSociedad(this.value)">
    <option value="ALL">Todas las sociedades</option>
    <option value="MX01">MX01 · Corporativo México</option>
    <option value="MX02">MX02 · Manufactura Norte</option>
    <option value="US01">US01 · International Trading</option>
  </select>
  <div class="tright">
    <span class="pill pill-y">● Datos mock</span>
    <span class="pill pill-m">API: pendiente conexión</span>
    <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">sync 08:14</span>
  </div>
</header>

<nav class="sidebar">
  <div class="nav-section">
    <div class="nav-label">Módulos</div>
    <div class="nav-item active" onclick="setPage('cxp')"><span class="nav-dot"></span>CXP — Proveedores</div>
    <div class="nav-item" onclick="setPage('cxc')"><span class="nav-dot"></span>CXC — Clientes</div>
    <div class="nav-item" onclick="setPage('alertas')"><span class="nav-dot"></span>Alertas <span class="nbadge" id="alertBadge">9</span></div>
    <div class="nav-item" onclick="setPage('concil')"><span class="nav-dot"></span>Conciliación</div>
    <div class="nav-item" onclick="setPage('gl')"><span class="nav-dot"></span>Validación GL</div>
  </div>
  <div class="ndiv"></div>
  <div class="nav-section">
    <div class="nav-label">Análisis</div>
    <div class="nav-item" onclick="setPage('kpis')"><span class="nav-dot"></span>KPIs &amp; tendencia</div>
  </div>
  <div class="ndiv"></div>
  <div class="nav-section">
    <div class="nav-label">Config</div>
    <div class="nav-item" onclick="setPage('sociedades')"><span class="nav-dot"></span>Sociedades &amp; monedas</div>
    <div class="nav-item" onclick="setPage('upload')"><span class="nav-dot"></span>Carga de archivos</div>
  </div>
  <div style="margin-top:auto;padding:14px;border-top:1px solid var(--border)">
    <div style="font-size:10px;color:var(--muted);font-family:var(--mono)">Ejercicio · Moneda</div>
    <div id="socFooter" style="font-family:var(--mono);font-size:12px;margin-top:3px">2025 · Multi-moneda</div>
  </div>
</nav>

<main class="main" id="mainContent"></main>
</div>

<script>
const SOCS={
  MX01:{code:'MX01',name:'Corporativo México SA de CV',cur:'MXN',curLabel:'Peso mexicano'},
  MX02:{code:'MX02',name:'Manufactura Norte SA de CV',cur:'MXN',curLabel:'Peso mexicano'},
  US01:{code:'US01',name:'International Trading LLC',cur:'USD',curLabel:'Dólar americano'},
};
const FX={MXN:1,USD:17.15,EUR:18.60};
const DT={
  KR:{label:'KR',desc:'Factura proveedor',module:'AP',ns:-1},
  KG:{label:'KG',desc:'Nota crédito prov.',module:'AP',ns:+1},
  RE:{label:'RE',desc:'Factura de compras',module:'AP',ns:-1},
  KZ:{label:'KZ',desc:'Pago proveedor',module:'AP',ns:0},
  DR:{label:'DR',desc:'Factura cliente',module:'AR',ns:+1},
  DG:{label:'DG',desc:'Nota crédito cliente',module:'AR',ns:-1},
  DZ:{label:'DZ',desc:'Cobro cliente',module:'AR',ns:0},
};
const GLA={
  '5100000':{desc:'Costo de ventas'},'5200000':{desc:'Gastos de operación'},
  '6100000':{desc:'Servicios profesionales'},'6200000':{desc:'Transportes y fletes'},
  '6300000':{desc:'Arrendamientos'},'6400000':{desc:'Materiales y suministros'},
  '1510000':{desc:'Activos fijos en uso'},'1520000':{desc:'Activos intangibles'},
  '1130000':{desc:'Pagos anticipados'},'4100000':{desc:'Ingresos por ventas'},
};

function toLc(amt,docCur,socCode){
  const soc=SOCS[socCode];
  const mxn=amt*FX[docCur];
  return soc.cur==='USD'?mxn/FX['USD']:mxn;
}
function calcAlerts(r){
  const alerts=[];
  const dt=DT[r.docType];
  if(dt&&dt.ns!==0){
    const expNeg=dt.ns<0;
    const isNeg=r.docAmount<0;
    if(expNeg!==isNeg){
      alerts.push((r.docType==='KR'||r.docType==='RE')?'reversa':'signo');
    }
  }
  if(r.aging>90)alerts.push('overdue');
  if(r.glFlag)alerts.push('gl');
  return alerts;
}

function enrich(rows){
  return rows.map(r=>{
    const soc=SOCS[r.soc];
    const lcAmt=toLc(r.docAmount,r.docCur,r.soc);
    const lcPaid=toLc(r.paid||0,r.docCur,r.soc);
    const alerts=calcAlerts(r);
    return{...r,soc,lcAmt,lcPaid,lcCur:soc.cur,alerts};
  });
}

function fmt(n,d=2){return new Intl.NumberFormat('es-MX',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n)}
function curTag(c){const cl=c==='USD'?'c-usd':c==='EUR'?'c-eur':'c-mxn';return`<span class="ctag ${cl}">${c}</span>`}
function bkt(d){const cl=d>90?'b90':d>60?'b60':d>30?'b30':'b0';const lb=d>90?'+90d':d>60?'61-90':d>30?'31-60':'0-30';return`<span class="bkt ${cl}">${lb}</span>`}
function stEl(s){const m={pendiente:['s-p','Pendiente'],parcial:['s-pa','Parcial'],pagado:['s-ok','Pagado'],vencido:['s-v','Vencido']};const[cl,lb]=m[s]||['s-p',s];return`<span class="st ${cl}"><span class="sd"></span>${lb}</span>`}
function atEl(al){const m={reversa:'<span class="at at-r">REVERSA</span>',signo:'<span class="at at-s">SIGNO</span>',overdue:'<span class="at at-o">+90d</span>',gl:'<span class="at at-g">GL</span>'};return al.map(a=>m[a]||'').join(' ')}
function dtEl(t,al){const info=DT[t]||{label:t,desc:t};const bad=al.includes('reversa')||al.includes('signo');return`<span class="dt${bad?' bad':''}" title="${info.desc}">${info.label}</span>`}
function glCell(acc){const g=GLA[acc]||{desc:acc};return`<div class="gl-cell"><div class="gl-num">${acc}</div><div class="gl-desc">${g.desc}</div></div>`}
function sbEl(code){return`<span class="sb">${code}</span>`}
function fSoc(rows){return curSoc==='ALL'?rows:rows.filter(r=>r.soc.code===curSoc)}
function saldo(r){return Math.abs(r.lcAmt)-Math.abs(r.lcPaid)}
function agingBkts(rows){const b={a:0,b:0,c:0,d:0};rows.forEach(r=>{const s=saldo(r);if(r.aging>90)b.d+=s;else if(r.aging>60)b.c+=s;else if(r.aging>30)b.b+=s;else b.a+=s;});return b}
function signNote(mod){
  if(mod==='AP')return`<div class="info-box"><strong>Signo en CXP (FI-AP):</strong> el saldo natural del proveedor es <strong>negativo</strong> (posición acreedora). <strong>KR/RE positivo</strong> = posible reversión o anulación — marcado como REVERSA. <strong>KG positivo</strong> es normal (nota de crédito que reduce el pasivo). La columna <em>Imp. Doc</em> muestra el monto en moneda del documento; <em>Imp. LC</em> en moneda de la sociedad con tipo de cambio aplicado.</div>`;
  return`<div class="info-box"><strong>Signo en CXC (FI-AR):</strong> el saldo natural del cliente es <strong>positivo</strong> (posición deudora). <strong>DR negativo</strong> es sospechoso — marcado como SIGNO. <strong>DG negativo</strong> es normal (nota de crédito). La columna <em>Imp. Doc</em> muestra el monto en moneda del documento; <em>Imp. LC</em> en moneda de la sociedad.</div>`;
}

// ── CSV / EXCEL PARSER ───────────────────────────────────────────────────────
// ── SAP FIORI COLUMN MAPPING ─────────────────────────────────────────────────
// Columnas exactas del export SAPUI5 (Manage Supplier/Customer Line Items)
// + sinónimos de exports alternativos (FBL1N, FBL5N, ALV, etc.)
const SAP_COLS = {
  // ── Identificadores de sociedad
  soc:          ['company code','bukrs','sociedad','soc','companycode'],
  socName:      ['company name','nombre sociedad','company'],
  // ── Proveedor / Cliente

  // ── Documento contable
  doc:          ['journal entry','belnr','documento','document','no. doc','journal entry number','asiento'],
  docType:      ['journal entry type','blart','tipo doc','doc type','tipo'],
  docDate:      ['posting date','bldat','fecha contab','fecha doc','posting'],
  journalDate:  ['journal entry date','budat','fecha asiento'],
  clearingDoc:  ['clearing journal entry','augbl','doc compensación','clearing doc'],
  clearingDate: ['clearing date','augdt','fecha compensación'],
  reference:    ['reference','xblnr','referencia','ref'],
  itemText:     ['item text','sgtxt','texto partida','text'],
  createdBy:    ['journal entry created by','usnam','creado por','created by'],
  // ── Importes y moneda
  docAmount:    ['amount (tran cur.)','wrbtr','amount (transaction currency)','importe transacción','monto','amount'],
  lcAmount:     ['amount (cocode crcy)','dmbtr','amount (company code currency)','importe moneda sociedad','importe lc'],
  docCur:       ['waers','currency','moneda','transaction currency','tran cur'],
  exchRate:     ['effect. exch. rate','kursf','tipo cambio','exchange rate','exch rate'],
  debitCredit:  ['debit/credit','shkzg','debe/haber','d/c','debit credit'],
  // ── Aging y estado
  aging:        ['days in arrears','daysinarrears','días atraso','dias atraso','aging','días','age'],
  clearStatus:  ['clearing status','augst','estado compensación','status','estado'],
  period:       ['year/period','gjahr','periodo','period','year'],
  // ── Cuenta contable
  glAcc:        ['recon. account','recon account','hkont','cuenta gl','gl account','reconciliation account','cuenta recon'],
  taxCode:      ['tax code','mwskz','código impuesto','tax'],
};

// ── DETECCIÓN AUTOMÁTICA DE SEPARADOR ────────────────────────────────────────
function detectSep(firstLine){
  // SAP Fiori exporta con ; en muchas localidades, también tab o ,
  const counts = { ';': 0, '\t': 0, ',': 0, '|': 0 };
  for(const c of firstLine) if(c in counts) counts[c]++;
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
}

// ── PARSER CSV ROBUSTO (maneja comillas, separadores mixtos, BOM) ─────────────
function parseCSV(text){
  // Quitar BOM si viene de SAP
  text = text.replace(/^\uFEFF/, '');
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if(lines.length < 2) return { headers:[], rows:[] };

  const sep = detectSep(lines[0]);

  // Parser que respeta campos entre comillas con separadores internos
  function splitLine(line) {
    const result = [];
    let cur = '', inQ = false;
    for(let i = 0; i < line.length; i++){
      const ch = line[i];
      if(ch === '"' && !inQ){ inQ = true; continue; }
      if(ch === '"' && inQ){
        if(line[i+1] === '"'){ cur += '"'; i++; } // comilla doble escapada
        else inQ = false;
        continue;
      }
      if(ch === sep && !inQ){ result.push(cur.trim()); cur = ''; continue; }
      cur += ch;
    }
    result.push(cur.trim());
    return result;
  }

  const headers = splitLine(lines[0]).map(h => h.replace(/^"|"$/g,'').trim());
  const rows = lines.slice(1).map(line => {
    const cells = splitLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cells[i] || '').trim());
    return obj;
  }).filter(r => Object.values(r).some(v => v));

  return { headers, rows };
}

// ── MATCH DE COLUMNAS (insensible a mayúsculas, espacios y acentos) ───────────
function normalizeStr(s){
  return (s||'').toString().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
function matchCol(headers, candidates){
  const hn = headers.map(normalizeStr);
  for(const c of candidates){
    const cn = normalizeStr(c);
    // Exacto primero
    const exact = hn.findIndex(h => h === cn);
    if(exact >= 0) return exact;
    // Contiene
    const partial = hn.findIndex(h => h.includes(cn) || cn.includes(h));
    if(partial >= 0) return partial;
  }
  return -1;
}

// ── PARSE DE NÚMERO (maneja 1.234,56 y 1,234.56 y negativos SAP) ─────────────
function parseNum(s){
  if(!s || s === '-' || s === '') return 0;
  s = s.toString().trim();
  // SAP a veces muestra negativos como "1.234,56-" (signo al final)
  const trailNeg = s.endsWith('-');
  s = s.replace(/-$/,'');
  // Detectar formato: si hay coma antes del punto → europeo (1.234,56)
  const lastComma = s.lastIndexOf(',');
  const lastDot   = s.lastIndexOf('.');
  let num;
  if(lastComma > lastDot){
    // Formato europeo: 1.234,56
    num = parseFloat(s.replace(/\./g,'').replace(',','.'));
  } else {
    // Formato americano: 1,234.56
    num = parseFloat(s.replace(/,/g,''));
  }
  if(isNaN(num)) return 0;
  return trailNeg ? -num : num;
}

// ── INFERIR TIPO DOCUMENTO DESDE DEBIT/CREDIT + MÓDULO ───────────────────────
// SAP Fiori expone Debit/Credit (H=Haber=Credit, S=Soll=Debit)
// AP natural: H (acreedor). AR natural: S (deudor)
function inferDocType(row, colIdx, module){
  const dc = (row[Object.keys(row)[colIdx['debitCredit']]] || '').trim().toUpperCase();
  const jtype = (row[Object.keys(row)[colIdx['docType']]] || '').trim().toUpperCase();
  if(jtype) return jtype; // Si viene explícito, usar ese
  if(module === 'AP') return dc === 'H' ? 'KR' : 'KZ';
  return dc === 'S' ? 'DR' : 'DG';
}

// ── INFERIR STATUS DESDE CLEARING STATUS ─────────────────────────────────────
function inferStatus(clearStatus, aging, amtDoc, amtPaid){
  const cs = (clearStatus || '').toLowerCase();
  if(cs.includes('clear') || cs.includes('compens') || cs.includes('cleared')) return 'pagado';
  if(amtPaid > 0 && amtPaid >= Math.abs(amtDoc)) return 'pagado';
  if(amtPaid > 0) return 'parcial';
  if(aging > 90) return 'vencido';
  if(aging > 0) return 'pendiente';
  return 'pendiente';
}

// ── MAPEAR FILAS AL MODELO INTERNO ───────────────────────────────────────────
function mapRows(parsedRows, headers, module){
  // Construir índice de columnas
  const colIdx = {};
  for(const [key, candidates] of Object.entries(SAP_COLS)){
    colIdx[key] = matchCol(headers, candidates);
  }

  const getCell = (row, key) => {
    const i = colIdx[key];
    if(i < 0) return '';
    const vals = Object.values(row);
    return (vals[i] || '').toString().trim();
  };

  // Detectar moneda desde encabezado de columna de importe si el campo WAERS no está
  let fallbackCur = 'MXN';
  if(colIdx['docCur'] >= 0){
    const curHeader = headers[colIdx['docCur']] || '';
    const match = curHeader.match(/\b([A-Z]{3})\b/);
    if(match) fallbackCur = match[1];
  }

  return parsedRows.map((row, i) => {
    const rawAmt  = parseNum(getCell(row, 'docAmount'));
    const rawLCAmt= parseNum(getCell(row, 'lcAmount'));
    const rawAging= Math.abs(parseInt(getCell(row, 'aging')) || 0);
    const clearSt = getCell(row, 'clearStatus');
    const dc      = getCell(row, 'debitCredit').toUpperCase();

    // Importe: usar LC si doc amount está vacío
    const useAmt = rawAmt !== 0 ? rawAmt : rawLCAmt;
    // Aplicar signo Debit/Credit de SAP
    // AP: H (Haber) = negativo natural, S (Soll) = positivo (reversa)
    // AR: S (Soll)  = positivo natural, H (Haber) = negativo (NC)
    let finalAmt = useAmt;
    if(dc === 'H' && module === 'AP') finalAmt = -Math.abs(useAmt);
    if(dc === 'S' && module === 'AP') finalAmt =  Math.abs(useAmt); // reversa
    if(dc === 'S' && module === 'AR') finalAmt =  Math.abs(useAmt);
    if(dc === 'H' && module === 'AR') finalAmt = -Math.abs(useAmt); // NC

    const docType = getCell(row, 'docType').toUpperCase() ||
                    (module === 'AP' ? (dc==='H'?'KR':'KZ') : (dc==='S'?'DR':'DG'));
    const docCur  = getCell(row, 'docCur').replace(/[^A-Z]/g,'').slice(0,3) || fallbackCur;
    const socRaw  = getCell(row, 'soc') || 'MX01';
    // Normalizar código sociedad: quitar espacios y tomar 4 chars
    const socCode = socRaw.replace(/\s/g,'').toUpperCase().slice(0,4) || 'MX01';
    const suppId  = getCell(row, 'supplierId');
    const name    = getCell(row, 'name') || `${module==='AP'?'Proveedor':'Cliente'} ${i+1}`;
    const glAcc   = getCell(row, 'glAcc') || '6100000';
    const docNum  = getCell(row, 'doc') || `DOC${String(i+1).padStart(6,'0')}`;
    const docDate = getCell(row, 'docDate') || getCell(row, 'journalDate') || '';
    const dueDate = getCell(row, 'clearingDate') || '';
    const paid    = clearSt.toLowerCase().includes('clear') ? Math.abs(finalAmt) : 0;
    const status  = inferStatus(clearSt, rawAging, finalAmt, paid);

    return {
      id: suppId || `F${String(i+1).padStart(3,'0')}`,
      soc: socCode, name, doc: docNum, docType,
      docDate, dueDate, docCur,
      docAmount: finalAmt, paid: paid ? -Math.abs(finalAmt) : 0,
      aging: rawAging, status, glAcc,
      _raw: { dc, clearSt, ref: getCell(row,'reference'), text: getCell(row,'itemText') },
    };
  }).filter(r => r.name && r.doc);
}

      <div style="display:flex;align-items:center;color:var(--muted);font-size:18px">→</div>
      <div style="flex:1;min-width:160px;background:var(--surface2);border:1px solid ${dataSource==='file'?'rgba(245,158,11,.35)':'var(--border)'};border-radius:8px;padding:14px">
        <div style="font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Prioridad 2 — Este módulo</div>
        <div style="font-size:12px;font-weight:600;color:var(--yellow);margin-bottom:4px">Carga manual CSV / Excel</div>
        <div style="font-size:11px;color:var(--muted)">Exportar desde SAP (transacción FBL1N / FBL5N / ALV) y subir aquí</div>
        <div style="margin-top:8px"><span class="src-file">${dataSource==='file'?'● Activo: '+fileSourceLabel:'● Disponible'}</span></div>
      </div>
      <div style="display:flex;align-items:center;color:var(--muted);font-size:18px">→</div>
      <div style="flex:1;min-width:160px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px">
        <div style="font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Prioridad 3</div>
        <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px">Datos mock</div>
        <div style="font-size:11px;color:var(--muted)">Para demo y pruebas · se reemplaza automáticamente al cargar datos reales</div>
        <div style="margin-top:8px"><span class="src-mock">${dataSource==='mock'?'● Activo ahora':''}</span></div>
      </div>
    </div>
  </div>

  <!-- Sync frequency -->
  <div class="sync-info">
    <div style="font-size:13px;font-weight:600;margin-bottom:4px">Frecuencia de actualización — cuando conectes la API</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:2px">Elige el modo según tus necesidades operativas. Los tres son viables con SAP OData.</div>
    <div class="sync-grid">
      <div class="sync-opt selected" id="sync-nightly" onclick="selectSync('nightly')">
        <div class="sync-freq">Recomendado</div>
        <div class="sync-opt-title">Nightly batch</div>
        <div class="sync-opt-sub">El scheduler corre cada noche a las 02:00 AM. Datos del día anterior disponibles al abrir el dashboard por la mañana. <strong>Suficiente para la mayoría de equipos de tesorería.</strong></div>
      </div>
      <div class="sync-opt" id="sync-ondemand" onclick="selectSync('ondemand')">
        <div class="sync-freq">Flexible</div>
        <div class="sync-opt-title">On-demand + botón</div>
        <div class="sync-opt-sub">La API se llama al presionar "Actualizar". El usuario controla cuándo refrescar. Ideal si los equipos tienen horarios de cierre definidos.</div>
      </div>
      <div class="sync-opt" id="sync-realtime" onclick="selectSync('realtime')">
        <div class="sync-freq">Mayor costo API</div>
        <div class="sync-opt-title">Near real-time</div>
        <div class="sync-opt-sub">Polling cada 15-30 min. SAP OData lo soporta, pero consume más cuota de llamadas. Recomendable solo si manejas pagos urgentes del día.</div>
      </div>
    </div>
  </div>

  <!-- Upload cards -->
  <div class="up-grid">
    <!-- CXP upload -->
    <div class="up-card" id="cardAP">
      <div class="up-card-title">
        <span style="color:var(--teal)">●</span> CXP — Proveedores
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto">FBL1N / BSIK export</span>
      </div>
      <div class="up-card-sub">
        Exporta desde SAP usando la app <strong>Manage Supplier Line Items</strong> (Fiori) 
        o la transacción <strong>FBL1N → Exportar → CSV</strong>. El separador puede ser 
        punto y coma, coma o tabulación — se detecta automáticamente.
      </div>
      <div class="drop-zone" id="dropAP" onclick="$('fileAP').click()" ondragover="dragOver(event,'dropAP')" ondragleave="dragLeave('dropAP')" ondrop="dropFile(event,'AP')">
        <div class="drop-icon">📂</div>
        <div class="drop-lbl"><strong>Arrastra tu archivo aquí</strong><br>o haz clic para seleccionar<br><span style="font-size:10px">CSV · TXT · separador auto-detectado · máx. 10 MB</span></div>
      </div>
      <input type="file" class="drop-input" id="fileAP" accept=".csv,.txt" onchange="handleFile(this,'AP')"/>
      <div class="tpl-row">
        <button class="up-btn sec" onclick="downloadTemplate('AP')">⬇ Plantilla CSV</button>
        <button class="up-btn" id="btnLoadAP" onclick="loadAP()" disabled>Cargar CXP →</button>
      </div>
      <div class="up-status" id="statusAP">Esperando archivo…</div>
      <div id="previewAP"></div>
    </div>

    <!-- CXC upload -->
    <div class="up-card" id="cardAR">
      <div class="up-card-title">
        <span style="color:var(--green)">●</span> CXC — Clientes
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto">FBL5N / BSID export</span>
      </div>
      <div class="up-card-sub">
        Exporta desde SAP usando la app <strong>Manage Customer Line Items</strong> (Fiori) 
        o la transacción <strong>FBL5N → Exportar → CSV</strong>. Separador auto-detectado.
      </div>
      <div class="drop-zone" id="dropAR" onclick="$('fileAR').click()" ondragover="dragOver(event,'dropAR')" ondragleave="dragLeave('dropAR')" ondrop="dropFile(event,'AR')">
        <div class="drop-icon">📂</div>
        <div class="drop-lbl"><strong>Arrastra tu archivo aquí</strong><br>o haz clic para seleccionar<br><span style="font-size:10px">CSV · TXT · separador auto-detectado · máx. 10 MB</span></div>
      </div>
      <input type="file" class="drop-input" id="fileAR" accept=".csv,.txt" onchange="handleFile(this,'AR')"/>
      <div class="tpl-row">
        <button class="up-btn sec" onclick="downloadTemplate('AR')">⬇ Plantilla CSV</button>
        <button class="up-btn" id="btnLoadAR" onclick="loadAR()" disabled>Cargar CXC →</button>
      </div>
      <div class="up-status" id="statusAR">Esperando archivo…</div>
      <div id="previewAR"></div>
    </div>
  </div>

  <!-- Column mapping reference -->
  <div class="up-card" style="margin-bottom:22px">
    <div style="font-size:13px;font-weight:600;margin-bottom:6px">Columnas reconocidas automáticamente</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6">
      El parser detecta el separador automáticamente (<strong>; , tab</strong>) y mapea los encabezados con o sin acentos.
      Compatible con exports de <strong>SAP Fiori</strong> (Manage Supplier/Customer Line Items), <strong>FBL1N</strong>, <strong>FBL5N</strong> y ALV estándar.
    </div>
    <div class="field-map">
      ${[
        ['Company Code',        'BUKRS · Sociedad · Soc'],
        ['Supplier / Customer', 'NAME1 · Proveedor · Cliente · Vendor Name'],
        ['Journal Entry',       'BELNR · Documento · Document'],
        ['Journal Entry Type',  'BLART · Tipo Doc · Doc Type'],
        ['Posting Date',        'BLDAT · Fecha Contab · Fecha Doc'],
        ['Recon. Account',      'HKONT · Cuenta GL · GL Account'],
        ['Amount (Tran Cur.)',  'WRBTR · Importe · Amount'],
        ['Amount (CoCode Crcy)','DMBTR · Importe LC · Amount LC'],
        ['Effect. Exch. Rate',  'KURSF · Tipo Cambio · Exchange Rate'],
        ['Debit/Credit',        'SHKZG · D/C · Debe/Haber'],
        ['Days in Arrears',     'Aging · Días Atraso · Days'],
        ['Clearing Status',     'AUGST · Estado · Status'],
        ['Clearing Date',       'AUGDT · Fecha Compensación'],
        ['Reference',           'XBLNR · Referencia · Ref'],
        ['Item Text',           'SGTXT · Texto Partida · Text'],
      ].map(([sap,cols])=>`
      <div class="field-row">
        <span class="field-sap">${sap}</span>
        <span class="field-arr">←</span>
        <span class="field-col">${cols}</span>
      </div>`).join('')}
    </div>
    <div style="margin-top:14px;padding:10px 14px;background:var(--surface2);border-radius:6px;font-size:11px;color:var(--muted);line-height:1.7">
      <strong style="color:var(--text)">Tip SAP Fiori:</strong> En la app "Manage Supplier Line Items" o "Supplier Line Items (Flexible)",
      usa el botón <strong>Export → Spreadsheet</strong>. El archivo descargado es un CSV con separador de punto y coma (;) — el parser lo detecta automáticamente.
      También puedes exportar desde <strong>FBL1N → Lista → Exportar → Valores locales de celda (CSV)</strong>.
    </div>
  </div>`;

  // Wire up state
  window._apData=null; window._arData=null;
  window._apHeaders=null; window._arHeaders=null;

  window.dragOver=(e,id)=>{e.preventDefault();$(id).classList.add('drag-over')};
  window.dragLeave=id=>{$(id).classList.remove('drag-over')};
  window.dropFile=(e,mod)=>{e.preventDefault();dragLeave('drop'+mod);const f=e.dataTransfer.files[0];if(f)processFile(f,mod)};
  window.handleFile=(inp,mod)=>{if(inp.files[0])processFile(inp.files[0],mod)};

  window.processFile=(file,mod)=>{
    const statusEl=$('status'+mod);
    statusEl.className='up-status';statusEl.textContent='Leyendo archivo…';
    $('preview'+mod).innerHTML='';
    if(file.size>10*1024*1024){statusEl.className='up-status err';statusEl.textContent='Archivo demasiado grande (máx 10 MB)';return;}
    const ext=file.name.split('.').pop().toLowerCase();
    if(!['csv','xlsx','xls','txt'].includes(ext)){statusEl.className='up-status err';statusEl.textContent='Formato no soportado. Usa CSV (.csv) o texto (.txt) exportado de SAP.';return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const { headers, rows } = parseCSV(e.target.result);
        if(!rows||rows.length===0){
          statusEl.className='up-status err';
          statusEl.textContent='No se encontraron datos. Verifica que el archivo tenga encabezados y al menos una fila.';
          return;
        }
        // Detectar separador para mostrar diagnóstico
        const firstLine = e.target.result.replace(/^\uFEFF/,'').split(/\r?\n/)[0];
        const sep = detectSep(firstLine);
        const sepName = sep===';'?'punto y coma (;)':sep==='\t'?'tabulación':sep===','?'coma (,)':'pipe (|)';

        const mapped = mapRows(rows, headers, mod);
        if(mapped.length===0){
          statusEl.className='up-status err';
          statusEl.textContent=`Columnas detectadas (${headers.length}) pero no se pudieron mapear filas. Verifica los encabezados.`;
          $('preview'+mod).innerHTML=`<div class="up-preview"><div class="up-prev-hdr"><span>Columnas detectadas en tu archivo</span></div><div style="padding:12px;font-family:var(--mono);font-size:11px;color:var(--muted);line-height:2">${headers.map(h=>`<span style="background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:3px;margin:2px;display:inline-block">${h}</span>`).join('')}</div></div>`;
          return;
        }
        if(mod==='AP'){window._apData=mapped;window._apHeaders=headers;$('btnLoadAP').disabled=false;}
        else{window._arData=mapped;window._arHeaders=headers;$('btnLoadAR').disabled=false;}
        statusEl.className='up-status ok';
        statusEl.textContent=`✓ ${mapped.length} partidas leídas · ${headers.length} columnas · separador: ${sepName} · "${file.name}"`;
        renderPreview(mapped.slice(0,6),mod,headers);
      }catch(err){
        statusEl.className='up-status err';
        statusEl.textContent='Error al leer el archivo: '+err.message;
        console.error(err);
      }
    };
    reader.readAsText(file,'UTF-8');
  };

  function renderPreview(rows, mod, headers){
    if(!rows||!rows.length)return;
    const keys=['soc','name','doc','docType','docDate','dueDate','docCur','docAmount','aging','status','glAcc'];
    // Show detected SAP headers and preview
    $('preview'+mod).innerHTML=`<div class="up-preview">
      <div class="up-prev-hdr">
        <span>Columnas detectadas en tu archivo (${headers.length})</span>
        <span style="color:var(--green);font-family:var(--mono);font-size:10px">SAP Fiori / ALV</span>
      </div>
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);line-height:2.2">
        ${headers.map(h=>`<span style="background:var(--surface2);border:1px solid var(--border2);padding:2px 7px;border-radius:3px;margin:2px;display:inline-block;font-family:var(--mono);font-size:10px;color:var(--text)">${h}</span>`).join('')}
      </div>
      <div class="up-prev-hdr" style="margin-top:0"><span>Vista previa · primeras ${rows.length} partidas mapeadas</span></div>
      <div class="up-prev-body"><table>
        <thead><tr>${keys.map(k=>`<th>${k}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r=>`<tr>${keys.map(k=>`<td>${r[k]??'—'}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>
    </div>`;
  }

  window.loadAP=()=>{
    if(!window._apData)return;
    applyFileData(window._apData,[],fileSourceLabel||'archivo CXP');
    $('statusAP').className='up-status ok';
    $('statusAP').textContent='✓ Datos CXP aplicados al dashboard · navega a CXP — Proveedores para ver los resultados';
    $('cardAP').classList.add('active-src');
    fileSourceLabel='Archivo CXP';
    buildUpload();
  };
  window.loadAR=()=>{
    if(!window._arData)return;
    applyFileData([],window._arData,fileSourceLabel||'archivo CXC');
    $('statusAR').className='up-status ok';
    $('statusAR').textContent='✓ Datos CXC aplicados al dashboard · navega a CXC — Clientes para ver los resultados';
    $('cardAR').classList.add('active-src');
    fileSourceLabel='Archivo CXC';
    buildUpload();
  };

  window.downloadTemplate=(mod)=>{
    const hdr='Sociedad,Proveedor,Documento,Tipo Doc,Fecha Doc,Vencimiento,Moneda,Importe,Pagado,Cuenta GL,Aging\n';
    const ex=mod==='AP'
      ? 'MX01,Proveedor Ejemplo SA,-482300.00,5100099999,KR,2025-01-15,2025-02-14,MXN,0.00,6300000,45\n'
        +'MX01,Proveedor USD Inc.,-28000.00,5100099991,KR,2025-02-10,2025-03-12,USD,0.00,6200000,16\n'
      : 'MX01,Cliente Ejemplo SA,1800099999,DR,2025-01-20,2025-02-19,MXN,934200.00,0.00,4100000,94\n'
        +'MX02,Export Client LLC,1900099991,DR,2025-02-10,2025-03-10,USD,55000.00,0.00,4100000,18\n';
    const blob=new Blob([hdr+ex],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`plantilla_${mod==='AP'?'CXP':'CXC'}.csv`;a.click();
    URL.revokeObjectURL(url);
  };

  window.selectSync=(mode)=>{
    ['nightly','ondemand','realtime'].forEach(m=>$('sync-'+m)?.classList.remove('selected'));
    $('sync-'+mode)?.classList.add('selected');
  };
}

function setPage(p){
  curPage=p;
  const pages=['cxp','cxc','alertas','concil','gl','kpis','sociedades','upload'];
  document.querySelectorAll('.nav-item').forEach((el,i)=>el.classList.toggle('active',pages[i]===p));
  if(p==='cxp')buildAging('AP');
  if(p==='cxc')buildAging('AR');
  if(p==='alertas')buildAlerts();
  if(p==='concil')buildConcil();
  if(p==='gl')buildGL();
  if(p==='kpis')buildKPIs();
  if(p==='sociedades')buildSociedades();
  if(p==='upload')buildUpload();
}
function setSociedad(v){
  curSoc=v;
  const lbl=v==='ALL'?'2025 · Multi-moneda':`${v} · ${SOCS[v].cur}`;
  $('socFooter').textContent=lbl;
  setPage(curPage);
}
setPage('cxp');
</script>
</body>
</html>
